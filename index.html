<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Club - Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="glass-container anim-fade-in">
        <header class="brand-header">
            <img src="logo.png" alt="Logo Bingo Club" class="main-logo-img">
            
            <img src="bienvenido.png" alt="Bienvenido" class="welcome-img">
        </header>
        
        <div class="access-box">

            <button class="btn-glow" onclick="validarEntrada()">INGRESAR AL CLUB</button>
        </div>

        <div class="support-footer">
            <p>¿No tienes código?</p>
            <a href="https://wa.me/584265709830" target="_blank" class="wa-link">Solicita tu código aquí</a>
        </div>
    </div>

    <script src="app.js"></script>

</html>
