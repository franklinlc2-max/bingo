<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Bingo Club</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos específicos para asegurar visibilidad en el panel */
        .admin-page { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .master-ball { 
            width: 80px; height: 80px; background: var(--marine); color: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; font-weight: 900; margin: 10px auto; border: 4px solid var(--mango); 
        }
        #listaSocios { width: 100%; margin-top: 15px; }
        .socio-card {
            background: white; padding: 10px; border-radius: 8px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="admin-page">

    <div class="glass-container" style="max-width: 500px; margin-bottom: 20px;">
        <h2 style="color: var(--marine); font-size: 1.2rem;">ESTADO DEL JUEGO</h2>
        <div id="bolaCantada" class="master-ball">--</div>
        <div id="datosGanador" style="background: rgba(255,255,255,0.6); padding: 10px; border-radius: 10px; min-height: 40px; font-size: 0.9rem;">
            Esperando ganador...
        </div>
    </div>

    <div class="glass-container" style="max-width: 500px; margin-bottom: 20px;">
        <h3 style="color: var(--marine); margin-bottom: 15px;">REGISTRAR SOCIO</h3>
        
        <input type="text" id="nombreSocio" placeholder="Nombre del Socio" class="input-modern">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 10px; border-radius: 10px;">
            <label style="font-weight: bold; font-size: 0.9rem;">Cartones (1-6):</label>
            <input type="number" id="cantCartones" min="1" max="6" value="1" style="width: 50px; text-align: center; border: 1px solid #ccc; border-radius: 5px;">
        </div>

        <button class="btn-glow" onclick="crearSocioMaestro()">GENERAR ACCESO</button>
        
        <div id="listaSocios">
            </div>
    </div>

    <div class="glass-container" style="max-width: 500px;">
        <h3 style="color: var(--marine); margin-bottom: 15px;">PROGRAMAR SORTEO</h3>
        <input type="datetime-local" id="fechaSorteo" class="input-modern">
        <button class="btn-glow" style="background: var(--mango);" onclick="guardarProgramacion()">ACTIVAR RELOJ</button>
        
        <div style="margin-top: 20px;">
            <button onclick="reiniciarTodo()" style="background:none; border:none; color:#666; text-decoration:underline; font-size: 0.7rem; cursor:pointer;">
                REINICIAR TODO EL SISTEMA (BORRAR DATOS)
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
